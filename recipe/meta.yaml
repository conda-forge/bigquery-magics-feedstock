{% set name = "bigquery-magics" %}
{% set version = "0.15.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: c32b4dc6feb3cae1f60839da1a9dc7913aeaf0720d4a0e51dbf47bf3158bb686

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - pyopenssl >=23.3.0
    - python >={{ python_min }}
    - db-dtypes >=1.1.1,<2.0.0
    - google-cloud-bigquery-core >=3.41.0,<4.0.0
    - ipywidgets >=7.7.1
    - ipython >=7.23.1
    - ipykernel >=5.5.6
    - packaging >=24.2.0
    - pandas >=1.5.3
    - pyarrow >=12.0.0
    - pydata-google-auth >=1.5.0
    - tqdm >=4.7.4,<5.0.0

test:
  imports:
    - bigquery_magics
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/googleapis/python-bigquery-magics
  summary: Google BigQuery magics for Jupyter and IPython
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tswast
